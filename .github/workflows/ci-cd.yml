# ===================================================================================
# 9ROUTER (GENFITY) - CI/CD PIPELINE
# ===================================================================================
#
# Build and deploy 9Router Next.js app via Docker
#
# Required Secrets:
#   - GHCR_TOKEN: GitHub Container Registry token
#   - VPS_HOST, VPS_USER, VPS_SSH_KEY: SSH access
#   - ENV_FILE: Production .env content (optional - managed on server)
#
# ===================================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'
      - 'i18n/**'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, deploy existing image'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/9router

jobs:
  # ===================================================================================
  # BUILD JOB
  # ===================================================================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false

  # ===================================================================================
  # DEPLOY JOB
  # ===================================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      (needs.build.result == 'success' || github.event.inputs.deploy_only == 'true') &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Log secrets usage
        run: |
          echo "📋 Secrets used in this workflow:"
          echo "  - VPS_HOST: ${{ secrets.VPS_HOST && '✅ Set' || '❌ Not set' }}"
          echo "  - VPS_USER: ${{ secrets.VPS_USER && '✅ Set' || '❌ Not set' }}"
          echo "  - VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY && '✅ Set' || '❌ Not set' }}"
          echo "  - GHCR_TOKEN: ${{ secrets.GHCR_TOKEN && '✅ Set' || '❌ Not set' }}"
          echo "  - ENV_FILE: ${{ secrets.ENV_FILE && '✅ Set' || '❌ Not set' }}"

      - name: Update ENV file on server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "📝 Updating .env file on server (full replace)..."
            printf '%s' "$ENV_FILE" | ssh $VPS_USER@$VPS_HOST "cat > /tmp/9router.env && sudo install -m 600 -o root -g root /tmp/9router.env ~/genfity/9router/.env && rm -f /tmp/9router.env"
            echo "✅ ENV file updated with full replace!"
          else
            echo "⏭️ ENV_FILE secret not set, .env managed manually on server"
          fi

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          echo "🚀 Deploying with docker compose..."

          ssh $VPS_USER@$VPS_HOST << ENDSSH
            cd ~/genfity/9router

            # This deploy directory is compose-only, not a git checkout.
            # CI publishes the image to GHCR; the server only needs to pull and recreate.

            # Login to GHCR
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u mygads --password-stdin

            # Pull and recreate
            export IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:latest
            sudo -E docker compose pull
            sudo -E docker compose up -d --force-recreate

            # Show running image after deploy
            sudo docker ps --filter name=9router
            sudo docker inspect 9router --format '{{.Image}} {{.Created}}'
            sudo docker logs 9router --tail 20 || true

            # Ensure env file remains root-owned and readable by compose only
            sudo ls -l ~/genfity/9router/.env ~/genfity/9router/docker-compose.yml

            # Health probe before finishing this SSH session
            curl -sf http://localhost:20128/api/health > /dev/null

            echo "✅ 9Router deployment complete!"

            # Cleanup old images
            echo "🧹 Cleaning up..."
            sudo docker image prune -af --filter "until=24h" 2>/dev/null || true

            echo "✅ 9Router deployment complete!"
          ENDSSH



      - name: Health Check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🏥 Running health check..."
          sleep 30

          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            for i in {1..5}; do
              if curl -sf http://localhost:20128/api/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                sudo docker ps | grep 9router
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done

            echo "❌ Health check failed!"
            sudo docker logs 9router --tail 50
            exit 1
          ENDSSH

      - name: Generate summary
        if: success()
        run: |
          echo "## 🚀 9Router Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://ai-core1.genfity.com" >> $GITHUB_STEP_SUMMARY

  # ===================================================================================
  # CLEANUP JOB
  # ===================================================================================
  cleanup:
    name: Cleanup Old Resources
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Cleanup server
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            echo "🧹 Running scheduled cleanup..."
            sudo docker system prune -f --filter "until=24h"
            echo "✅ Cleanup complete!"
          ENDSSH
