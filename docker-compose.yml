services:
  9router:
    image: ${IMAGE:-ghcr.io/mygads/9router:latest}
    container_name: 9router
    restart: unless-stopped
    ports:
      - "20128:20128"
    env_file:
      - .env
    volumes:
      - 9router-data:/app/data
      - 9router-usage:/root/.9router
    networks:
      - genfity-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:20128/dashboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  9router-data:
    driver: local
  9router-usage:
    driver: local

networks:
  genfity-network:
    external: true
